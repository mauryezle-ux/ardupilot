name: Build Mauricio FC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi python3 python3-pip python3-dev make g++ ccache

      - name: Configure
        run: ./waf configure --board MambaF405v2_Mauricio

      - name: Build Copter
        run: ./waf copter

      - name: Upload APJ
        uses: actions/upload-artifact@v4
        with:
          name: arducopter-mauricio
          path: build/MambaF405v2_Mauricio/bin/arducopter.apj
