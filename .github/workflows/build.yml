name: Build Mauricio FC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-dev gcc-arm-none-eabi g++ make
          python3 -m pip install empy==3.3.4

      - name: Init submodules
        run: |
          git submodule update --init --recursive

      - name: Copy bootloader
        run: |
          cp Tools/bootloaders/MambaF405v2_bl.bin Tools/bootloaders/MambaF405v2_Mauricio_bl.bin

      - name: Configure
        run: |
          ./waf configure --board MambaF405v2_Mauricio

      - name: Build
        run: |
          ./waf copter

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/MambaF405v2_Mauricio/bin/arducopter.apj
